<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GitHub Upload Test</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: Arial, sans-serif; background: #f7f7f4; color: #202124; }
    main { width: min(680px, calc(100% - 40px)); border: 1px solid #d8d8d2; border-radius: 8px; padding: 32px; background: #fff; box-shadow: 0 12px 30px rgba(0,0,0,.08); }
    h1 { margin: 0 0 12px; font-size: 32px; }
    p { margin: 8px 0; font-size: 18px; line-height: 1.5; }
    .stamp { margin-top: 24px; font-size: 14px; color: #5f6368; }
  </style>
</head>
<body>
  <main>
    <h1>GitHub Upload Test</h1>
    <p>This page was uploaded through the GitHub connector.</p>
    <p>Status: uploaded successfully.</p>
    <p class="stamp">Test date: 2026-07-02, Asia/Shanghai</p>
  </main>
</body>
</html>
